version: '3'
services:
  magic:
    image: mageai/mageai:latest
    command: mage start mage
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      USER_CODE_PATH: /home/src/mage
      ENV: ${ENV}
    ports:
      - 6789:6789
    volumes:
      - /home/user/mage:/home/src/
      - /home/user/rclone:/rclone
    restart: on-failure:5
